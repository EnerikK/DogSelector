services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dogselector
      POSTGRES_USER: dogselector
      POSTGRES_PASSWORD: dogselector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: